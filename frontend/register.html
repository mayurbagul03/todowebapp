<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Todo App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <div class="kicker">New here?</div>
      <h1>Create your <em>account</em></h1>

      <!-- error / success messages appear here -->
      <div class="msg" id="msg"></div>

      <form id="registerForm">
        <div class="row2">
          <div>
            <label for="firstName">First name</label>
            <input
              type="text"
              id="firstName"
              required
              maxlength="50"
              autocomplete="given-name"
            />
          </div>
          <div>
            <label for="lastName">Last name</label>
            <input
              type="text"
              id="lastName"
              required
              maxlength="50"
              autocomplete="family-name"
            />
          </div>
        </div>

        <div>
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            required
            maxlength="50"
            autocomplete="username"
          />
          <div class="hint">
            This is what you'll log in with — must be unique.
          </div>
        </div>

        <div>
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            required
            minlength="6"
            autocomplete="new-password"
          />
          <div class="hint">At least 6 characters.</div>
        </div>

        <div>
          <label for="confirm">Confirm password</label>
          <input
            type="password"
            id="confirm"
            required
            autocomplete="new-password"
          />
        </div>

        <button class="primary" type="submit" id="submitBtn">Register</button>
      </form>

      <p class="switch-link">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </main>

    <script>
      const msg = document.getElementById("msg");
      const btn = document.getElementById("submitBtn");

      function show(text, type) {
        msg.textContent = text;
        msg.className = "msg " + type;
      }

      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault(); // stop the browser's default page-reload submit

          const first_name = document.getElementById("firstName").value.trim();
          const last_name = document.getElementById("lastName").value.trim();
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const confirm = document.getElementById("confirm").value;

          // client-side checks BEFORE bothering the server
          if (password !== confirm) {
            show("Passwords do not match.", "error");
            return;
          }

          btn.disabled = true;
          try {
            const res = await fetch("/api/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                first_name,
                last_name,
                username,
                password,
              }),
            });
            const data = await res.json();

            if (res.ok) {
              show("Account created! Redirecting to login…", "ok");
              setTimeout(() => (location.href = "login.html"), 1200);
            } else if (res.status === 409) {
              // username already taken
              show(
                data.error || "Username already exists. Try another or login.",
                "error",
              );
            } else {
              show(data.error || "Registration failed.", "error");
            }
          } catch {
            show("Cannot reach the server. Is app.py running?", "error");
          } finally {
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
