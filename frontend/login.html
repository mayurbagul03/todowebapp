<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Todo App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <div class="kicker">Welcome back</div>
      <h1>Sign <em>in</em></h1>

      <div class="msg" id="msg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div>
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" />
        </div>
        <div>
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            required
            autocomplete="current-password"
          />
        </div>
        <button class="primary" type="submit" id="submitBtn">Login</button>
      </form>

      <p class="switch-link">
        No account yet? <a href="register.html">Register here</a>
      </p>
    </main>

    <script>
      async function handleLogin(event) {
        event.preventDefault();
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = "/dashboard.html";
        } else {
          document.getElementById("msg").textContent = data.error;
        }
      }
    </script>
  </body>
</html>
