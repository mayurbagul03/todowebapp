<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Todo App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <div class="kicker">Welcome back</div>
      <h1>Sign <em>in</em></h1>

      <div class="msg" id="msg"></div>

      <form id="loginForm">
        <div>
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" />
        </div>
        <div>
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            required
            autocomplete="current-password"
          />
        </div>
        <button class="primary" type="submit" id="submitBtn">Login</button>
      </form>

      <p class="switch-link">
        No account yet? <a href="register.html">Register here</a>
      </p>
    </main>

    <script>
      const msg = document.getElementById("msg");
      const btn = document.getElementById("submitBtn");

      function show(text, type) {
        msg.textContent = text;
        msg.className = "msg " + type;
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;

          btn.disabled = true;
          try {
            const res = await fetch("/api/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (res.ok) {
              // success -> go to the todo list page
              location.href = "todos.html";
            } else if (data.code === "USER_NOT_FOUND") {
              // username not in db -> tell them, then send to register
              show(data.error + " — taking you to the register page…", "error");
              setTimeout(() => (location.href = "register.html"), 2000);
            } else {
              // wrong password etc -> show error, stay here
              show(data.error || "Login failed.", "error");
            }
          } catch {
            show("Cannot reach the server. Is app.py running?", "error");
          } finally {
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
